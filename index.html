<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Academy</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
/* ===== BACKGROUND MASTERPIECE ===== */
body {
  background: #020617;
  overflow-x: hidden;
}

.bg-art {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* glowing blobs */
.blob {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(124,58,237,0.6), transparent 70%);
  filter: blur(80px);
  animation: float 12s infinite ease-in-out alternate;
}

.blob:nth-child(2) {
  background: radial-gradient(circle, rgba(6,182,212,0.6), transparent 70%);
  top: 30%;
  left: 60%;
  animation-delay: 3s;
}

.blob:nth-child(3) {
  background: radial-gradient(circle, rgba(236,72,153,0.5), transparent 70%);
  top: 60%;
  left: 20%;
  animation-delay: 6s;
}

@keyframes float {
  from { transform: translateY(-50px) scale(1); }
  to { transform: translateY(50px) scale(1.2); }
}

/* grid overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* glass */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
}

/* text gradient */
.gradient-text {
  background: linear-gradient(90deg, #7c3aed, #06b6d4, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* fade animation */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}
.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body class="text-white">

<!-- BACKGROUND -->
<div class="bg-art">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="grid-overlay"></div>
</div>

<!-- HERO -->
<section class="relative z-10 min-h-screen flex items-center justify-center text-center px-6">

  <div class="max-w-3xl fade-up">
    <h1 class="text-4xl md:text-6xl font-bold mb-6 gradient-text leading-tight">
      Освой нейросети
    </h1>

    <p class="text-lg md:text-xl text-gray-300 mb-10">
      Научись автоматизировать задачи, создавать арты, музыку, видео, программировать и многое другое
    </p>

    <button onclick="scrollToForm()" 
      class="px-10 py-4 rounded-xl bg-gradient-to-r from-purple-600 to-cyan-500 hover:scale-110 transition">
      Начать
    </button>
  </div>

</section>

<!-- FORM SCREEN -->
<section id="formSection" class="relative z-10 min-h-screen flex items-center justify-center px-6">

  <div class="glass p-10 rounded-2xl max-w-md w-full fade-up">

    <h2 class="text-2xl mb-6 text-center">Записаться</h2>

    <form id="form" class="space-y-4">
      <input id="name" type="text" placeholder="Имя" required 
        class="w-full p-3 rounded bg-black/40">

      <input id="email" type="email" placeholder="Email" required 
        class="w-full p-3 rounded bg-black/40">

      <button class="w-full py-3 rounded bg-gradient-to-r from-purple-600 to-cyan-500 hover:scale-105 transition">
        Отправить
      </button>
    </form>

    <p id="status" class="hidden mt-4 text-green-400 text-center">
      Заявка отправлена 🚀
    </p>

  </div>

</section>

<script>
// SCROLL
function scrollToForm() {
  document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
}

// ANIMATION
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

// TELEGRAM
document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;

  const text = `Новая заявка:\nИмя: ${name}\nEmail: ${email}`;

  const TOKEN = "YOUR_BOT_TOKEN";
  const CHAT_ID = "YOUR_CHAT_ID";

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  })
  .then(() => {
    document.getElementById('status').classList.remove('hidden');
  })
  .catch(() => {
    alert("Ошибка отправки");
  });
});
</script>

</body>
</html>
