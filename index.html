    }

      background: rgba(255,255,255,0.08);
    }
  </style>

<body class="bg-white text-black dark:bg-black dark:text-white transition duration-500">

<!-- HEADER -->
<header class="fixed w-full z-50 glass border-b border-white/10">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">AI Academy</h1>

    <button onclick="toggleTheme()" class="text-sm px-3 py-1 border rounded-lg hover:scale-105 transition">
      🌗
    </button>
  </div>
</header>

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center gradient-bg text-white px-4">
  <div class="text-center max-w-3xl">

    <h2 class="text-3xl md:text-5xl font-bold leading-tight mb-6 animate-fade">
      Научись создавать<br>
      видео, арты, музыку,<br>
      программировать и автоматизировать<br>
      задачи с помощью AI
    </h2>

    <p class="text-lg opacity-80 mb-8">
      Чат-боты, нейросети и реальные навыки будущего — уже сегодня
    </p>

    <a href="#form"
       class="px-6 py-3 bg-white text-black rounded-xl font-semibold hover:scale-105 transition shadow-xl">
      Начать обучение
    </a>

  </div>
</section>

  <section class="py-16 px-4">
  <div class="max-w-4xl mx-auto text-center">

    <h3 class="text-2xl md:text-3xl font-bold mb-6">
      Посмотри, как это выглядит
    </h3>

    <div class="relative w-full rounded-2xl overflow-hidden shadow-2xl"
         style="padding-top: 56.25%;">

      <iframe
        class="absolute top-0 left-0 w-full h-full"
        src="https://app.heygen.com/embeds/f0cb83fa1007445b93ffd46939274e7f"
        title="Avatar IV Video"
        frameborder="0"
        allow="encrypted-media; fullscreen;"
        allowfullscreen>
      </iframe>

    </div>

  </div>
</section>

<!-- FORM -->
<section id="form" class="py-20 px-4">
  <div class="max-w-xl mx-auto text-center">

    <h3 class="text-3xl font-bold mb-6">
      Оставь заявку
    </h3>

    <p class="opacity-70 mb-10">
      Мы свяжемся с тобой через Telegram
    </p>

    <div class="glass rounded-2xl p-6 shadow-2xl">

      <input
        id="phone"
        type="tel"
        placeholder="Введите номер телефона"
        class="w-full px-4 py-3 rounded-xl mb-4 bg-transparent border border-gray-300 dark:border-gray-600 outline-none focus:ring-2 focus:ring-indigo-500 transition"
      />

      <button onclick="submitForm()"
        class="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:scale-105 transition">
        Отправить
      </button>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="text-center py-6 opacity-60 text-sm">
  AI Academy © 2026
</footer>

<!-- JS -->
<script>
function submitForm() {
  const phone = document.getElementById('phone').value.trim();

  if (!phone) {
    alert("Введите номер телефона");
    return;
  }

  const text = encodeURIComponent("Заявка с сайта AI Academy. Телефон: " + phone);

  const url = "https://t.me/serega40in?text=" + text;

  window.open(url, "_blank");
}
</script>

<!-- Animations -->
<style>
@keyframes fade {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

.animate-fade {
  animation: fade 1.2s ease forwards;
}
</style>
